# BJC AP CSP — Spanish
#
# Mirrors configs/csp.yml: same assignment list, translated strings, .es paths.

title: "Belleza y alegría de la informática — AP CSP"
identifier: "bjc-csp-es"
language: "es"
course_file: "course/bjc4nyc.es.html"
base_url: "https://bjc.edc.org"
description: |
  BJC es un curriculum de AP Computer Science Principles aprobado por el College
  Board. Los estudiantes programan en Snap! mientras construyen comprensión
  sobre abstracción, datos, Internet, algoritmos y los impactos sociales de la
  computación.

auto_quizzes:
  enabled: true

auto_assignments:
  enabled: true
  points: 10
  submission_types: [online_text_entry, online_upload]
  skip_topics:
    - "nyc_bjc/create-task.es.topic"

sidebar_links:
  - title: "Entorno de programación Snap!"
    url: "https://snap.berkeley.edu/snap/snap.html"
  - title: "Sitio web de BJC"
    url: "https://bjc.edc.org/"
  - title: "Guía de referencia rápida de Snap!"
    url: "/bjc-r/cur/snap-cheat-sheet.es.html"
  - title: "Índice de vocabulario de BJC"
    url: "/bjc-r/cur/programming/vocab-index.es.html"
  - title: "Marco del curso AP CSP (College Board)"
    url: "https://apcentral.collegeboard.org/courses/ap-computer-science-principles/course"

# Lista idéntica a la del curso en inglés (el ticket pide misma lista para
# CSP y CSP en español), con texto traducido y `topic` apuntando a los .es.topic.
assignments:
  - id: "ap-create-task-practice"
    title: "Create Task de AP — Práctica (con borrador de PPR)"
    topic: "nyc_bjc/create-task.es.topic"
    points: 50
    submission_types: [online_upload, online_text_entry]
    description: |
      Trabaja las ocho páginas de la Create Task una vez como práctica. Entrega
      un borrador de la Personalized Project Reference (PPR), tu proyecto de
      Snap! y el video explicativo.

      Durante la práctica puedes recibir ayuda de tu maestro y compañeros — el
      objetivo es aprender el flujo de trabajo antes de la entrega oficial.

  - id: "ap-create-task-official"
    title: "Create Task de AP — Entrega oficial (con PPR)"
    topic: "nyc_bjc/create-task.es.topic"
    points: 100
    submission_types: [online_upload]
    description: |
      Entrega oficial de la Create Task de AP CSP: código del programa, video,
      respuestas escritas y la Personalized Project Reference (Componente C).

      No puedes recibir ayuda de nadie durante la entrega oficial. La entrega
      final se realiza a través del AP Digital Portfolio — sube los archivos
      aquí también para el registro de tu maestro.
