# BJC Sparks (middle school) — English

title: "Beauty and Joy of Computing — Sparks"
identifier: "bjc-sparks"
language: "en"
course_file: "course/sparks.html"
base_url: "https://bjc.edc.org"
description: |
  BJC Sparks is the middle-school version of BJC: a hands-on introduction to
  programming with Snap!, with hardware activities and an introduction to AI.

auto_quizzes:
  enabled: true

auto_assignments:
  enabled: true
  points: 5
  submission_types: [online_text_entry, online_upload]

sidebar_links:
  - title: "Snap! Programming Environment"
    url: "https://snap.berkeley.edu/snap/snap.html"
  - title: "BJC Sparks Vocabulary Index"
    url: "/bjc-r/sparks/student-pages/vocab-index.html"
  - title: "BJC Website"
    url: "https://bjc.edc.org/"

# Sparks doesn't have a high-stakes AP assignment; this is a placeholder that a
# teacher can copy or replace based on their unit pacing.
assignments:
  - id: "sparks-unit-1-project"
    title: "Unit 1 Project — Functions and Data"
    topic: "sparks/1-functions-data.topic"
    points: 25
    submission_types: [online_upload, online_text_entry]
    description: |
      Submit your finished Unit 1 Snap! project and a short reflection
      (2–3 paragraphs) explaining what you built, what worked, and what
      you would change.
